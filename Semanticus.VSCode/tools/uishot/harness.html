<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semanticus Studio — screenshot harness</title>
  <!-- The real webview gets its CSS vars from the VS Code theme; here the studio.css :root fallbacks
       (dark theme) apply automatically. We pin a stable dark page background so shots are deterministic. -->
  <link rel="stylesheet" href="../../media/studio/studio.css" />
  <style> html, body, #root { height: 100%; } body { background: #1e1e1e; } </style>

  <!-- MOCK ENGINE: stub acquireVsCodeApi + answer the webview's RPC with fixture data, BEFORE studio.js
       loads (bridge.ts calls acquireVsCodeApi() at module init). Override the fixtures by setting
       window.__UISHOT__ = { graph, session, scorecard, state } on the page before navigation. -->
  <script>
  (function () {
    const cfg = window.__UISHOT__ || {};

    // A small but representative model that exercises every cardinality + edge state:
    //  one-to-many (active), many-to-many, one-to-one, bidirectional, inactive, isolated.
    const tbl = (name, o = {}) => Object.assign(
      { ref: 'table:' + name, name, isHidden: false, isDateTable: false, isCalculated: false, isFieldParameter: false,
        columns: 8, measures: 0, keyColumns: [name + 'Key'], hasDescription: true }, o);
    const rel = (fromTable, toTable, o = {}) => Object.assign(
      { name: fromTable + '_' + toTable, fromTable, fromColumn: toTable + 'Key', toTable, toColumn: toTable + 'Key',
        fromCardinality: 'Many', toCardinality: 'One', crossFilter: 'OneDirection', isActive: true }, o);

    // ?g=mini → a 3-relationship graph that isolates the cardinality notation at high zoom (markers render big).
    const scenario = new URLSearchParams(location.search).get('g');
    // ?lay=1 → seed an ENGINE layout (get_layout) so the All-tables diagram snaps to those positions instead of
    // auto-arranging — a single column, visibly distinct from dagre, proving the engine-owned layout drives the canvas.
    const layScenario = new URLSearchParams(location.search).get('lay') === '1';
    const MINI = {
      tables: [tbl('Sales', { measures: 12 }), tbl('Date', { isDateTable: true }), tbl('Promotion'),
               tbl('Product'), tbl('Currency')],
      relationships: [
        rel('Sales', 'Date'),                                                       // one-to-many
        rel('Sales', 'Promotion', { fromCardinality: 'Many', toCardinality: 'Many' }), // many-to-many (fork+fork)
        rel('Product', 'Currency', { fromCardinality: 'One', toCardinality: 'One' }),   // one-to-one (bar+bar)
      ],
    };

    // ?g=galaxy → a multi-fact "galaxy"/bus-matrix schema (3 facts sharing conformed dims + 2 snowflake outriggers),
    // the realistic stress test for the Layered / Bus-matrix / Hierarchy layouts (many crossing relationship lines).
    const GALAXY = {
      tables: [
        tbl('Sales', { measures: 18, columns: 14, keyColumns: [] }),
        tbl('Inventory', { measures: 6, columns: 9, keyColumns: [] }),
        tbl('Returns', { measures: 5, columns: 8, keyColumns: [] }),
        tbl('Date', { isDateTable: true, columns: 16 }),
        tbl('Product', { columns: 12 }),
        tbl('Customer', { columns: 12 }),
        tbl('Store', { columns: 9 }),
        tbl('Promotion', { columns: 6 }),
        tbl('Geography', { columns: 7 }),     // snowflake outrigger off Customer + Store
        tbl('ProductCategory', { columns: 5 }), // snowflake outrigger off Product
        tbl('Budget', { isCalculated: true, columns: 5, keyColumns: [] }),
        tbl('Notes', { columns: 3, keyColumns: [], hasDescription: false }), // isolated
      ],
      relationships: [
        rel('Sales', 'Date'), rel('Sales', 'Product'), rel('Sales', 'Customer'), rel('Sales', 'Store'),
        rel('Sales', 'Promotion'), rel('Sales', 'Budget'),
        rel('Inventory', 'Date'), rel('Inventory', 'Product'), rel('Inventory', 'Store'),
        rel('Returns', 'Date'), rel('Returns', 'Product'), rel('Returns', 'Customer', { isActive: false }),
        rel('Customer', 'Geography', { crossFilter: 'BothDirections' }),
        rel('Store', 'Geography'),
        rel('Product', 'ProductCategory'),
      ],
    };

    // ?g=star → ONE fact + several conformed dims, rendered large: the clearest view to JUDGE attach-point ordering.
    // Bus matrix: the fact's right edge should fan to the dims TOP→BOTTOM in their LEFT→RIGHT order. Layered: the dims
    // fan down to the fact, each on its own staggered lane.
    const STAR = {
      tables: [
        tbl('Sales', { measures: 18, columns: 14, keyColumns: [] }),
        tbl('Date', { isDateTable: true, columns: 16 }), tbl('Product', { columns: 12 }),
        tbl('Customer', { columns: 12 }), tbl('Store', { columns: 9 }),
        tbl('Promotion', { columns: 6 }), tbl('Currency', { columns: 4 }),
      ],
      relationships: [
        rel('Sales', 'Date'), rel('Sales', 'Product'), rel('Sales', 'Customer'),
        rel('Sales', 'Store'), rel('Sales', 'Promotion'), rel('Sales', 'Currency'),
      ],
    };

    // ?g=docstress → the Docs relationship renderer's failure shape from production acceptance: a medium connected
    // graph plus enough isolated/measure tables to expose Dagre's narrow, magnified disconnected-node column.
    const DOCSTRESS = (function () {
      const related = [
        tbl('Sales', { measures: 18, keyColumns: [] }), tbl('Inventory', { measures: 6, keyColumns: [] }),
        tbl('Returns', { measures: 5, keyColumns: [] }), tbl('Date', { isDateTable: true }), tbl('Product'),
        tbl('Customer'), tbl('Store'), tbl('Promotion'), tbl('Currency'), tbl('Geography'),
        tbl('Product Category'), tbl('Warehouse'), tbl('Budget', { isCalculated: true, keyColumns: [] }),
      ];
      const isolated = Array.from({ length: 21 }, function (_, i) { return tbl('Standalone ' + (i + 1), { keyColumns: [] }); });
      return {
        tables: related.concat(isolated),
        relationships: [
          rel('Sales', 'Date'), rel('Sales', 'Product'), rel('Sales', 'Customer'), rel('Sales', 'Store'),
          rel('Sales', 'Promotion'), rel('Sales', 'Currency'), rel('Sales', 'Budget'),
          rel('Inventory', 'Date'), rel('Inventory', 'Product'), rel('Inventory', 'Store'),
          rel('Inventory', 'Warehouse'), rel('Inventory', 'Currency'),
          rel('Returns', 'Date'), rel('Returns', 'Product'), rel('Returns', 'Customer'), rel('Returns', 'Store'),
          rel('Customer', 'Geography'), rel('Store', 'Geography'), rel('Product', 'Product Category'),
          rel('Budget', 'Date'),
        ],
      };
    }());

    // ?g=onerel → a single many→one relationship, rendered huge: to inspect the crow's-foot marker orientation.
    const ONEREL = { tables: [tbl('Sales', { measures: 12 }), tbl('Date', { isDateTable: true })], relationships: [rel('Sales', 'Date')] };

    // ?g=twofact → exactly TWO facts sharing conformed dims — to judge the per-fact crossbar BANDS (each fact's fan
    // at distinct heights) and the centre-outward symmetry, at a readable size.
    const TWOFACT = {
      tables: [
        tbl('Sales', { measures: 18, columns: 14, keyColumns: [] }),
        tbl('Returns', { measures: 6, columns: 9, keyColumns: [] }),
        tbl('Date', { isDateTable: true, columns: 16 }), tbl('Product', { columns: 12 }),
        tbl('Customer', { columns: 12 }), tbl('Store', { columns: 9 }), tbl('Promotion', { columns: 6 }),
      ],
      relationships: [
        rel('Sales', 'Date'), rel('Sales', 'Product'), rel('Sales', 'Customer'), rel('Sales', 'Store'), rel('Sales', 'Promotion'),
        rel('Returns', 'Date'), rel('Returns', 'Product'), rel('Returns', 'Customer'),
      ],
    };

    const GRAPH = cfg.graph || (scenario === 'mini' ? MINI : null) || (scenario === 'galaxy' ? GALAXY : null) || (scenario === 'star' ? STAR : null) || (scenario === 'docstress' ? DOCSTRESS : null) || (scenario === 'twofact' ? TWOFACT : null) || (scenario === 'onerel' ? ONEREL : null) || {
      tables: [
        tbl('Sales', { measures: 12, columns: 14, keyColumns: [], hasDescription: true }),
        tbl('Date', { isDateTable: true, columns: 16 }),
        tbl('Product', { columns: 10 }),
        tbl('Customer', { columns: 12 }),
        tbl('Geography', { columns: 7 }),
        tbl('Store', { columns: 9 }),
        tbl('Currency', { columns: 4 }),
        tbl('Promotion', { columns: 6, hasDescription: false }),
        tbl('Budget', { isCalculated: true, columns: 5, keyColumns: [] }),
        tbl('Fields by Measure', { isCalculated: true, isFieldParameter: true, columns: 3, keyColumns: [], hasDescription: false }), // field parameter (violet + FP)
        tbl('Notes', { columns: 3, keyColumns: [], hasDescription: false }), // isolated (no rels)
      ],
      relationships: [
        rel('Sales', 'Date'),                                   // one-to-many, active
        rel('Sales', 'Product'),                                // one-to-many, active
        rel('Sales', 'Customer'),                               // one-to-many, active
        rel('Sales', 'Store', { isActive: false }),             // one-to-many, INACTIVE (dashed)
        rel('Customer', 'Geography', { crossFilter: 'BothDirections' }), // bidirectional (amber, animated)
        rel('Product', 'Currency', { toCardinality: 'One', fromCardinality: 'One' }), // one-to-one (bar+bar)
        rel('Sales', 'Promotion', { fromCardinality: 'Many', toCardinality: 'Many' }), // many-to-many (fork+fork)
        rel('Sales', 'Budget'),                                 // one-to-many to a calc table
      ],
    };

    const specScenario = new URLSearchParams(location.search).get('spec');
    const SESSION = cfg.session || {
      sessionId: 'uishot', modelName: specScenario === 'empty' ? 'New model' : 'Contoso (mock)', measures: specScenario === 'empty' ? 0 : 12, tables: specScenario === 'empty' ? 0 : GRAPH.tables.length,
      hasUnsavedChanges: false, liveConnected: false, currentAccount: 'kane@contoso.com', currentTenant: 'contoso.com',
      // Live-bound endpoint carries the workspace NAME (url-encoded) — matches a WORKSPACES displayName so Lineage's
      // Published-reports picker can demo the auto-default (pre-select the model's own workspace once workspaces list).
      liveEndpoint: 'powerbi://api.powerbi.com/v1.0/myorg/Contoso%20%5BTest%5D', liveDatabase: 'Contoso',
    };
    const cat = (category, score, weight, applicable, violations) => ({ category, score, weight, applicable, violations, hasRules: true });
    const find = (ruleId, ruleTitle, category, severity, fix, objectRef, objectName, message) =>
      ({ ruleId, ruleTitle, category, severity, fix, objectRef, objectName, message });
    const SCORECARD = cfg.scorecard || {
      overall: 82, rawOverall: 82, grade: 'B', gatedBy: [],
      categories: [
        cat('Naming & Clarity', 91, 0.2, 40, 4),
        cat('Descriptions & Grounding', 64, 0.25, 30, 11),
        cat('Synonyms', 73, 0.15, 22, 6),
        cat('Data Types & Formatting', 95, 0.15, 28, 2),
        cat('Relationships', 88, 0.15, 8, 1),
        cat('Scale & Limits', 100, 0.1, 12, 0),
      ],
      coverage: {}, safeFixCount: 6, waivedCount: 1,
      findings: [
        find('DESC-MISSING', 'Measure has no description', 'Descriptions & Grounding', 'Warning', 'AiContent', 'measure:Sales/m1', 'Sales[m1]', 'AI tools rely on descriptions to ground answers — this measure has none.'),
        find('SYN-MISSING', 'Table has no synonyms', 'Synonyms', 'Info', 'AiContent', 'table:Customer', 'Customer', 'Add natural-language synonyms so Q&A/Copilot can resolve user phrasing.'),
        find('FK-HIDDEN', 'Foreign key not hidden', 'Naming & Clarity', 'Warning', 'SafeFix', 'column:Sales/CustomerKey', 'Sales[CustomerKey]', 'Hide technical key columns from report authors and AI.'),
        find('NAME-ACRONYM', 'Cryptic measure name', 'Naming & Clarity', 'Info', 'Proposal', 'measure:Sales/m1', 'Sales[m1]', 'Rename "m1" to a descriptive business name.'),
        find('BIDI-REL', 'Bi-directional relationship', 'Relationships', 'Warning', 'Proposal', 'rel:Customer_Geography', 'Customer ↔ Geography', 'Bi-directional cross-filter can create ambiguous AI answers.'),
        Object.assign(find('NAME-MEASURE', 'Cryptic measure name', 'Naming & Clarity', 'Medium', 'AiContent', 'measure:Finance/NPAT ACT YTD', 'Finance[NPAT ACT YTD]', 'Measure name uses acronyms (NPAT/ACT/YTD).'),
          { waived: true, waiverReason: 'Standard finance acronyms, defined in the model AI-instructions glossary.' }),
        // A finding produced by a USER-AUTHORED (custom) rule — renders with the "(custom rule)" provenance suffix.
        Object.assign(find('ORG-FMT-KPI', 'KPI measures need format strings', 'Data Types & Formatting', 'Medium', 'None', 'measure:Sales/KPI Margin', 'Sales[KPI Margin]', 'Sales[KPI Margin] has no format string, so its numbers render raw.'),
          { custom: true }),
      ],
    };
    // The manage list behind both tabs' "Custom rules" panels (get_custom_rules): one rule of each kind + the
    // engine-supplied category/scope vocabularies the authoring form's dropdowns render.
    const CUSTOM_RULES = cfg.customRules || {
      bpa: [
        { id: 'ORG_HIDE_KEYS', name: 'Hide key columns', category: 'Model Layout', severity: 2, scope: 'Column', expression: 'Name.EndsWith("Key") and not IsHidden', fixExpression: 'IsHidden = true', description: '%object% looks like a key column and is visible.' },
      ],
      readiness: [
        { id: 'ORG-FMT-KPI', name: 'KPI measures need format strings', category: 'Formatting', severity: 'Medium', scope: 'Measure', appliesTo: 'DisplayFolder.StartsWith("KPI")', expression: 'string.IsNullOrEmpty(FormatString)', message: '%object% has no format string, so its numbers render raw.' },
      ],
      readinessCategories: ['Naming', 'Descriptions', 'Synonyms', 'Relationships', 'Visibility', 'Formatting', 'CopilotLimits', 'DataAgentConfig', 'BestPractice'],
      scopes: ['Measure', 'Column', 'DataColumn', 'CalculatedColumn', 'CalculatedTableColumn', 'Table', 'CalculatedTable', 'Hierarchy', 'Level', 'Relationship', 'Partition', 'Perspective', 'Culture', 'KPI', 'NamedExpression', 'CalculationGroup', 'CalculationItem', 'ModelRole', 'Model'],
      note: null,
    };

    const BPA = cfg.bpa || {
      ruleCount: 27, violationCount: 6, autoFixable: 4, waivedCount: 1, ruleErrors: [],
      violations: [
        { ruleId: 'BIDI', ruleName: 'Avoid bi-directional relationships', category: 'Performance', severity: 2, objectRef: 'rel:Customer_Geography', objectName: 'Customer ↔ Geography', message: 'Bi-directional cross-filter can hurt performance and create ambiguity.', canAutoFix: true },
        { ruleId: 'HIDE_FK', ruleName: 'Hide foreign-key columns', category: 'Formatting', severity: 1, objectRef: 'column:Sales/CustomerKey', objectName: 'Sales[CustomerKey]', message: 'Foreign-key columns should be hidden from report authors.', canAutoFix: true },
        { ruleId: 'NO_DESC', ruleName: 'Provide descriptions', category: 'Metadata', severity: 1, objectRef: 'table:Promotion', objectName: 'Promotion', message: 'Object has no description.', canAutoFix: false },
        { ruleId: 'SUMMARIZE', ruleName: 'Set SummarizeBy=None on key columns', category: 'Formatting', severity: 2, objectRef: 'column:Date/DateKey', objectName: 'Date[DateKey]', message: 'Key column should not be summarized.', canAutoFix: true },
        { ruleId: 'NAMING', ruleName: 'Measure naming convention', category: 'Naming', severity: 1, objectRef: 'measure:Sales/m1', objectName: 'Sales[m1]', message: 'Measure name is not descriptive.', canAutoFix: false },
        { ruleId: 'PERF_UNUSED_COLUMNS', ruleName: 'Remove unused columns', category: 'Performance', severity: 1, objectRef: 'column:Account/MA P&L Level 3', objectName: 'Account[MA P&L Level 3]', message: 'Column is not referenced by any measure or relationship.', canAutoFix: false, waived: true, waiverReason: 'Kept intentionally for ad-hoc P&L drill-down.' },
        // A violation from a USER-AUTHORED (model-embedded) rule — renders with the "(custom rule)" suffix.
        { ruleId: 'ORG_HIDE_KEYS', ruleName: 'Hide key columns', category: 'Model Layout', severity: 2, objectRef: 'column:Store/StoreKey', objectName: 'Store[StoreKey]', message: 'Store[StoreKey] looks like a key column and is visible.', canAutoFix: true, custom: true },
      ],
    };
    // Component split by encoding, mirroring real VertiPaq shape: Hash (high-cardinality) pays a big dictionary +
    // hash index; Value/RLE are almost all data. This exercises the dictionary-dominated + hash-index-heavy findings.
    const vcol = (table, column, total, encoding, pct) => {
      var f = encoding === 'Value' ? { data: 0.97, dict: 0.02, hidx: 0.01 }
            : encoding === 'RLE'   ? { data: 0.90, dict: 0.08, hidx: 0.02 }
            :                        { data: 0.14, dict: 0.56, hidx: 0.30 };   // Hash
      return { table, column, totalSize: total, encoding, pctOfModel: pct,
        dataSize: Math.round(total * f.data), dictionarySize: Math.round(total * f.dict), hashIndexSize: Math.round(total * f.hidx) };
    };
    // ?dl=1 renders the model with resident-only storage observations and Entity-bound partitions,
    // so the read-correctness caveats can be screenshotted.
    const directLake = new URLSearchParams(location.search).get('dl') === '1';
    const VPAQ = cfg.vpaq || {
      queryIdentity: 'localhost:51000|Contoso', storageMode: 'import',
      modelSize: 48500000, columnCount: 64,
      tables: [
        { name: 'Sales', size: 32000000, rows: 2300000, columns: 14, pctOfModel: 66 },
        { name: 'Customer', size: 8200000, rows: 18500, columns: 22, pctOfModel: 17 },
        { name: 'Product', size: 4100000, rows: 2500, columns: 18, pctOfModel: 8 },
        { name: 'Date', size: 2000000, rows: 3650, columns: 9, pctOfModel: 4 },
        { name: 'Geography', size: 1200000, rows: 600, columns: 6, pctOfModel: 2 },
        { name: 'Store', size: 1000000, rows: 200, columns: 7, pctOfModel: 2 },
      ],
      topColumns: [
        vcol('Sales', 'SalesAmount', 9500000, 'Value', 20),
        vcol('Sales', 'OrderDateKey', 6200000, 'Hash', 13),
        vcol('Sales', 'CustomerKey', 5800000, 'Hash', 12),
        vcol('Customer', 'CustomerName', 4300000, 'Hash', 9),
        vcol('Sales', 'ProductKey', 3100000, 'Hash', 6),
        vcol('Product', 'ProductName', 2000000, 'Hash', 4),
        vcol('Customer', 'MiddleName', 1500000, 'Hash', 3),   // large + unused (see UNUSED) → the "Can remove" group
        vcol('Sales', 'Quantity', 1500000, 'Value', 3),
        vcol('Customer', 'City', 1200000, 'Hash', 2),
        vcol('Date', 'Date', 900000, 'Value', 2),
        vcol('Product', 'Category', 700000, 'RLE', 1),
        vcol('Sales', 'DiscountAmount', 600000, 'Value', 1),
        vcol('Store', 'StoreName', 400000, 'Hash', 1),
      ],
    };
    if (directLake) {
      VPAQ.storageMode = 'directLake';
      VPAQ.caveat = 'Direct Lake: storage sizes and row counts reflect only the columns currently resident in memory (paged in by recent queries). They are partial, not the full-model totals.';
      VPAQ.tables = VPAQ.tables.map(function (t) { return Object.assign({}, t, { rows: null }); });
    }

    const meas = (name, table, folder, fmt, hasDesc, desc, expr, hidden) =>
      ({ ref: 'measure:' + table + '/' + name, name, table, displayFolder: folder || '', formatString: fmt || '',
         isHidden: !!hidden, hasDescription: !!hasDesc, description: desc || '', expression: expr || '' });
    const MEASURES = cfg.measures || [
      meas('Total Sales', 'Sales', 'Sales\\KPIs', '\\$#,##0', true, 'Sum of SalesAmount across all rows.', 'SUM ( Sales[SalesAmount] )'),
      meas('Total Cost', 'Sales', 'Sales\\KPIs', '\\$#,##0', false, '', 'SUM ( Sales[Cost] )'),
      meas('Margin', 'Sales', 'Sales\\KPIs', '\\$#,##0', true, 'Sales minus cost.', '[Total Sales] - [Total Cost]'),
      meas('Margin %', 'Sales', 'Sales\\KPIs', '', true, 'Margin as a percent of sales.', 'DIVIDE ( [Margin], [Total Sales] )'),
      meas('Order Count', 'Sales', '', '#,##0', false, '', 'COUNTROWS ( Sales )'),
      meas('YoY %', 'Sales', 'Sales\\Time Intelligence', '', false, '', 'DIVIDE ( [Total Sales] - [PY Sales], [PY Sales] )'),
      meas('PY Sales', 'Sales', 'Sales\\Time Intelligence', '\\$#,##0', true, 'Prior-year sales (SAMEPERIODLASTYEAR).', "CALCULATE ( [Total Sales], SAMEPERIODLASTYEAR ( 'Date'[Date] ) )"),
      meas('_Base Rate', 'Sales', '', '0.00', false, '', '0.15', true),
      meas('Customer Count', 'Customer', '', '#,##0', true, 'Distinct customers in context.', 'DISTINCTCOUNT ( Customer[CustomerKey] )'),
    ];

    const col = (name, table, dataType, summarizeBy, opts) => Object.assign(
      { ref: 'column:' + table + '/' + name, name, table, dataType, displayFolder: '', formatString: '',
        summarizeBy: summarizeBy || 'None', dataCategory: '', isKey: false, isHidden: false, isCalculated: false,
        hasDescription: false, description: '', expression: '' }, opts || {});
    const COLUMNS = cfg.columns || [
      // sourceColumn = the PARTITION-OUTPUT name M operates on; two differ from the model name on purpose so
      // the dual-identity plumbing (M ops write SourceColumn, display/DAX keep Name) is exercised.
      col('SalesAmount', 'Sales', 'Decimal', 'Sum', { hasDescription: true, description: 'Line-item sales amount.', sourceColumn: 'sales_amount_usd' }),
      col('Cost', 'Sales', 'Decimal', 'Sum'),
      col('CustomerKey', 'Sales', 'Int64', 'Sum', { isKey: true }),                 // visible key + aggregating (smell)
      col('OrderDateKey', 'Sales', 'Int64', 'None', { isKey: true, isHidden: true }),// hidden key, not aggregating (good)
      col('OrderDate', 'Sales', 'DateTime', 'None', { isHidden: true, sourceColumn: 'order_dt' }),
      col('Quantity', 'Sales', 'Int64', 'Sum', { hasDescription: true, description: 'Units sold.' }),
      // calculated → sourceColumn null on the wire; the M ops for it must STAND DOWN with the calc-specific note
      col('GrossMargin', 'Sales', 'Decimal', 'None', { isCalculated: true, expression: '[SalesAmount] - [Cost]', sourceColumn: null }),
      col('CustomerKey', 'Customer', 'Int64', 'None', { isKey: true, isHidden: true }),
      col('CustomerName', 'Customer', 'String', 'None', { hasDescription: true, description: 'Full customer name.' }),
      col('MiddleName', 'Customer', 'String', 'None'),   // large + unused → resolvable so its Delete/Reveal are enabled
      col('FullName', 'Customer', 'String', 'None', { isCalculated: true, expression: "[FirstName] & \" \" & [LastName]" }),
      col('Year', 'Date', 'Int64', 'None', { hasDescription: true, description: 'Calendar year.' }),
      col('DateKey', 'Date', 'Int64', 'Sum', { isKey: true }),                       // visible key + aggregating (smell)
    ];

    // A realistic change plan (Optimize tab): items across several categories with mixed status/risk, so the
    // collapsible category sections + diff/approve UI render (the empty-plan default shows only the CTA).
    const pitem = (o) => ({
      id: o.id, objectRef: o.objectRef, objectName: o.objectName, kind: o.kind || 'set_description',
      source: o.source || 'ai', category: o.category, severity: o.severity || 'Warning', risk: o.risk || 'ai',
      ruleId: o.ruleId || '', target: o.target || 'description', title: o.title, rationale: o.rationale || '',
      before: o.before, after: o.after, status: o.status || 'proposed', generated: !!o.generated, verifyState: o.verifyState,
    });
    const PLAN = cfg.plan || {
      planId: 'plan-1', scope: 'whole model', revision: 7,
      items: [
        pitem({ id: 'c1', category: 'Naming & Clarity', objectRef: 'table:tbl_Sales', objectName: 'tbl_Sales', kind: 'rename', source: 'deterministic', risk: 'rename', ruleId: 'NAME-TABLE', target: 'name', title: 'Rename to a human-readable name', rationale: 'Drop the tbl_ modelling prefix.', before: 'tbl_Sales', after: 'Sales', status: 'approved' }),
        pitem({ id: 'c2', category: 'Naming & Clarity', objectRef: 'measure:Sales/m1', objectName: 'Sales[m1]', kind: 'rename', source: 'ai', risk: 'rename', ruleId: 'NAME-MEASURE', target: 'name', title: 'Give the measure a descriptive name', rationale: 'm1 is cryptic.', before: 'm1', after: 'Average Order Value', status: 'proposed' }),
        pitem({ id: 'c3', category: 'Formatting', objectRef: 'column:Sales/CustomerKey', objectName: 'Sales[CustomerKey]', kind: 'set_property', source: 'bpa', risk: 'safe', ruleId: 'SUMMARIZE', target: 'summarizeBy', title: 'Stop aggregating a key column', rationale: 'Keys should not sum.', before: 'Sum', after: 'None', status: 'approved' }),
        pitem({ id: 'c4', category: 'Formatting', objectRef: 'column:Sales/CustomerKey', objectName: 'Sales[CustomerKey]', kind: 'set_property', source: 'deterministic', risk: 'safe', ruleId: 'FK-HIDDEN', target: 'isHidden', title: 'Hide a technical foreign key', rationale: 'Hide from report authors + AI.', before: 'visible', after: 'hidden', status: 'approved' }),
        pitem({ id: 'c5', category: 'Documentation', objectRef: 'measure:Sales/Total Cost', objectName: 'Sales[Total Cost]', kind: 'set_description', source: 'ai', risk: 'ai', ruleId: 'DESC-MISSING', target: 'description', title: 'Author a description', rationale: 'Grounds Copilot / Q&A.', status: 'needs_content' }),
        pitem({ id: 'c6', category: 'Documentation', objectRef: 'measure:Sales/Margin', objectName: 'Sales[Margin]', kind: 'set_description', source: 'ai', risk: 'ai', ruleId: 'DESC-MISSING', target: 'description', title: 'Author a description', rationale: 'Grounds Copilot / Q&A.', after: 'Sales minus cost — gross margin in currency.', status: 'approved', generated: true }),

        { revision: 104, origin: 'agent', label: 'Applied a 6-item change plan', deltas: [{ kind: 'update', ref: 'measure:Sales/m1' }, { kind: 'update', ref: 'column:Sales/CustomerKey' }, { kind: 'update', ref: 'measure:Sales/Total Cost' }] },
      ];
      setTimeout(function () {
        EDITS.forEach(function (e, i) {
          setTimeout(function () {
            window.dispatchEvent(new MessageEvent('message', { data: { type: 'didChange', payload: { sessionId: 'uishot', revision: e.revision, origin: e.origin, label: e.label, deltas: e.deltas } } }));
          }, i * 40);
        });
      }, 500);
    })();
  })();
  // ?deploy=... drives the unified release surface into a representative decision state. Rollback runs its
  // read-only preview; Promote loads stages and previews; Advanced can show delivery tools or Data Agent.
  (function () {
    var mode = new URLSearchParams(location.search).get('deploy');
    if (!['rollback', 'promote', 'advanced', 'dataagent'].includes(mode)) return;
    var step = 0, tries = 0;
    var iv = setInterval(function () {
      var buttons = [].slice.call(document.querySelectorAll('button'));
      if (step === 0) {
        var label = mode === 'rollback' ? 'Roll back' : mode === 'promote' ? 'Promote' : 'Advanced';
        var primary = buttons.find(function (b) { return (b.textContent || '').trim() === label; });
        if (primary) { primary.click(); step = 1; if (mode === 'advanced') clearInterval(iv); }
      } else if (mode === 'rollback') {
        var preview = buttons.find(function (b) { return (b.textContent || '').trim() === 'Preview rollback'; });
        if (preview) { preview.click(); clearInterval(iv); }
      } else if (mode === 'promote') {
        var action = buttons.find(function (b) { return (b.textContent || '').trim() === (step === 1 ? 'List Fabric pipelines' : 'Preview'); });
        if (action && !action.disabled) { action.click(); if (step === 1) step = 2; else clearInterval(iv); }
      } else if (mode === 'dataagent') {
        var dataAgent = buttons.find(function (b) { return (b.textContent || '').trim() === 'Data Agent'; });
        if (dataAgent) { dataAgent.click(); clearInterval(iv); }
      }
      if (++tries > 500) clearInterval(iv);
    }, 20);
  })();
  </script>
</head>
<body>
  <div id="root"></div>
  <!-- type="module": studio.js is now an ES module so it can dynamic-import() its code-split chunks (the lazy
       M-code cluster). Modules are deferred — the head mock-engine script still runs first, and the tab-select
       poller below polls for nav buttons, so ordering is unaffected. -->
  <script type="module" src="../../media/studio/studio.js"></script>
  <!-- Auto-select the tab named in the URL hash (e.g. harness.html#Diagram) once the webview has mounted,
       so a CLI screenshot (Edge --screenshot) lands on the right tab with no driver. Polls under virtual time. -->
  <script>
  (function () {
    var want = decodeURIComponent((location.hash || '').slice(1)).trim();
    if (!want) return;
    var w = want.toLowerCase();
    var tries = 0, groupIdx = 0;
    var iv = setInterval(function () {
      // 1. Exact match on ANY button (primary lifecycle groups + the active group's secondary tab row + the
      //    standalone far-right buttons). Secondary tabs (Compare/Deploy/Data Agent/Docs) only exist in the DOM
      //    while their lifecycle GROUP is active — so if the exact match isn't found yet we cycle the group buttons
      //    (step 3) to reveal each group's secondary row, then a later tick finds + clicks the target.
      var exact = [].slice.call(document.querySelectorAll('button'))
        .find(function (x) { return x.getBoundingClientRect().top < 180 && (x.textContent || '').trim().toLowerCase() === w; });
      if (exact) { exact.click(); clearInterval(iv); return; }
      // 2. Buttons carrying a trailing badge (Edit History's count, Data Agent's Pro pill) — startsWith fallback
      //    on ANY button, after the exact pass so a shorter sibling label (e.g. 'Data') still wins its exact match.
      var near = [].slice.call(document.querySelectorAll('button'))
        .find(function (x) { return x.getBoundingClientRect().top < 180 && (x.textContent || '').trim().toLowerCase().indexOf(w) === 0; });
      if (near) { near.click(); clearInterval(iv); return; }
      // 3. Not visible yet — advance to the next lifecycle group to reveal its secondary tab row.
      var groups = [].slice.call(document.querySelectorAll('nav button'));
      if (groups.length) { groups[groupIdx % groups.length].click(); groupIdx++; }
      if (++tries > 400) clearInterval(iv);
    }, 20);
  })();
  // ?evidence=open → expand every audit-trail "Details" row after the tab mounts, so a screenshot shows the
  // typed evidence renderers (candidate DAX, mismatch grids, benchmark bars) instead of collapsed rows.
  (function () {
    if (new URLSearchParams(location.search).get('evidence') !== 'open') return;
    var tries = 0;
    var iv = setInterval(function () {
      var btns = [].slice.call(document.querySelectorAll('button')).filter(function (x) { return (x.textContent || '').trim() === 'Details'; });
      btns.forEach(function (b) { b.click(); });
      if ((btns.length > 0 && ++tries > 10) || ++tries > 400) clearInterval(iv);   // a few passes: rows render in waves
    }, 60);
  })();

  // ?tests=overview|measures|relationships|security|history → drive the Tests tab the way a user would:
  // click Run tests (the results only exist after a run), then open the requested section. 'overview'
  // stays on the default view (the hero band + measures list); 'measures' additionally opens the root
  // band's Inspect evidence so the workbench (SQL/DAX + compare table) is in the shot. Section tab
  // buttons carry a count in their text, so they match by PREFIX, not equality.
  (function () {
    var mode = new URLSearchParams(location.search).get('tests');
    if (!mode) return;
    var btns = function () { return [].slice.call(document.querySelectorAll('button')); };
    var byText = function (t) { return btns().find(function (b) { return (b.textContent || '').trim().toLowerCase() === t; }); };
    var byPrefix = function (t) { return btns().find(function (b) { return (b.textContent || '').trim().toLowerCase().indexOf(t) === 0; }); };
    var poll = function (get, cb, n) {
      n = n || 0; var el = get();
      if (el) { cb(el); return; }
      if (n > 240) return;
      setTimeout(function () { poll(get, cb, n + 1); }, 25);
    };
    poll(function () { return byText('run tests'); }, function (runBtn) {
      runBtn.click();
      // wait for the hero lockup (the grade renders only once the run lands)
      poll(function () { return document.body.textContent.indexOf('coverage') >= 0 ? true : null; }, function () {
        if (mode === 'overview') return;
        if (mode === 'report') { poll(function () { var b = byPrefix('report'); return b && !b.disabled ? b : null; }, function (b) { b.click(); }); return; }
        if (mode === 'measures') { poll(function () { return byText('inspect evidence'); }, function (b) { b.click(); }); return; }
        poll(function () { return byPrefix(mode); }, function (b) {
          b.click();
          // Model Interview now precedes the suite sections. Selecting a section without moving its tab into view
          // produced a technically different screenshot that still showed only the interview above the fold.
          setTimeout(function () { b.scrollIntoView({ block: 'start', behavior: 'auto' }); }, 80);
        });
      });
    });
  })();

  // ?pq=menu|profile → drive the M transforms surface in the unified M workspace: wait for the
  // loaded-data sample to auto-load (T2: the column-op menu now lives on the PREVIEW GRID HEADERS via the ⌄
  // trigger — data-colmenu={index} — and the old separate chip strip / "Sample of loaded data" toggle are gone),
  // then either open a header column menu (a text column, so the text ops show) or toggle the profiling strip.
  (function () {
    var pqMode = new URLSearchParams(location.search).get('pq');
    if (!pqMode) return;
    var btns = function () { return [].slice.call(document.querySelectorAll('button')); };
    var byText = function (t) { return btns().find(function (b) { return (b.textContent || '').trim() === t; }); };
    var poll = function (get, cb, n) {
      n = n || 0; var el = get();
      if (el) { cb(el); return; }
      if (n > 240) return;
      setTimeout(function () { poll(get, cb, n + 1); }, 25);
    };
    if (pqMode === 'menu') {
      // wait for the sample grid header to render (auto-loads on connect), then open the 2nd column's ⌄ menu
      poll(function () { return document.querySelector('[data-colmenu="1"]'); }, function (m) { m.click(); });
    } else if (pqMode === 'profile') {
      poll(function () {
        var lbl = [].slice.call(document.querySelectorAll('label')).find(function (x) { return (x.textContent || '').trim().indexOf('Profile') === 0; });
        return lbl && lbl.querySelector('input');
      }, function (cb) { cb.click(); });
    }
  })();
  </script>
</body>
</html>
